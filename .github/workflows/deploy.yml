name : Push 기반 CI/CI 테스트

# container 브랜치에서 push 이벤트(리슨->on)가 발생되면 아래 설정한 내용되고 작동한다!!
on:
  push:
    branches: [ "container" ]

jobs:
  # app 관련 이미지 생성 허브에 푸시 (소스코드/리소스 모두 포함되어 있음)
  ci:
    runs-on: ubuntu-latest
    steps:
      # 체크아웃, 소스코드를 ci서버에 다운
      - name : 코드 checkout
        uses: actions/checkout@v3

      # 도커허브 로그인 -> ID/PW
      # 시크릿 변수로 DOCKER_USERNAME, DOCKER_PASSWORD 생성
      - name: Docker hub login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      # fastapi app에 대한 이미지 빌드 푸시 동시 진행
      - name: Build and Push fastapi app
        uses: docker/build-push-action@v4
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fastapi-app:1.1
      
      # nginx-proxy:1.0 형태로 이미지 빌드 -> 푸시
      - name: Build and Push nginx-proxy
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nginx-proxy:1.0
  
  # 실습
  # EC2에 docker-compose.yml, 설정파일 등 copy
  # 도커 컴포즈 SSH 명령어 실행
  cd:
    # ci 잡업이 완료(이미지 빌드/푸시 완료)한 뒤에만 실행
    needs: ci
    # cd 작업을 위한 서버 세팅
    runs-on: ubuntu-latest
    steps:
      # 1. 소스코드 체크아웃
      - name: 코드 checkout
        uses: actions/checkout@v3

      # 현재 레포의 docker-compose.yml을 EC2로 복사
      # 시크릿 변수로 EC2_HOST, EC2_USERNAME, EC2_KEY(pem 파일 내용) 필요
      - name: docker-compose.yml to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: ./docker-compose.yml
          target: "/home/ubuntu"

      # EC2에 SSH 접속하여 최신 이미지 pull 후 컨테이너 재기동
      - name: Run Script And Service Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            # 작업 디렉토리 이동 (docker-compose.yml 존재하는 위치)
            cd /home/ubuntu
            # 필요 시 .env 생성 -> 시크릿 변수 읽어서 파일 처리 (여기서는 생략)
            # 최신 이미지 가져오기
            docker compose pull
            # 컨테이너 구성 -> 신규 혹은 교체
            docker compose up -d
            # 이미지가 최식으로 교체되면 기존 것 가비지가되어서 공간만 차지함
            docker image prune -f
